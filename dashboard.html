<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Quiz AVC1 SAI2</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}
h1{font-size:1.4rem;color:#1e3a5f;margin-bottom:4px}
.subtitle{color:#64748b;font-size:.85rem;margin-bottom:20px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.1);padding:24px;width:100%;max-width:720px;margin-bottom:16px}
.card h2{font-size:1rem;color:#1e3a5f;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.stat{flex:1;min-width:120px;text-align:center;padding:14px;background:#f8fafc;border-radius:8px}
.stat-n{font-size:1.8rem;font-weight:700;color:#1e3a5f}
.stat-l{font-size:.8rem;color:#64748b;margin-top:2px}
.chart-wrap{position:relative;height:260px}
.erro-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f1f5f9;font-size:.88rem}
.erro-item:last-child{border-bottom:none}
.erro-badge{background:#fef2f2;color:#dc2626;font-weight:700;padding:2px 8px;border-radius:10px;font-size:.8rem;flex-shrink:0}
.erro-tema{font-size:.75rem;color:#64748b;margin-top:2px}
.empty{text-align:center;color:#94a3b8;font-size:.9rem;padding:20px 0}
.btn-reset{padding:10px 20px;background:#dc2626;color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .2s}
.btn-reset:hover{background:#b91c1c}
.btn-voltar{padding:10px 20px;background:#1e3a5f;color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;margin-right:10px}
.btn-voltar:hover{background:#2c5282}
.sem-dados{text-align:center;padding:40px 20px;color:#64748b}
.sem-dados p{margin-bottom:12px}
</style>
</head>
<body>
<h1>📊 Dashboard de Estudos</h1>
<p class="subtitle">Quiz AVC1 SAI2 — 6° Semestre · UNISA</p>

<div id="sem-dados" style="display:none" class="card">
  <div class="sem-dados">
    <p style="font-size:2rem">📭</p>
    <p>Nenhum dado registrado ainda.</p>
    <p>Responda algumas questões no quiz para ver suas estatísticas aqui.</p>
    <button class="btn-voltar" onclick="window.location.href='index.html'">← Ir ao Quiz</button>
  </div>
</div>

<div id="dashboard-content">
  <!-- Resumo global -->
  <div class="card" id="card-resumo">
    <h2>🎯 Resumo Geral</h2>
    <div class="stat-row" id="stats-globais"></div>
  </div>

  <!-- Gráfico por tema -->
  <div class="card">
    <h2>📈 Desempenho por Tema</h2>
    <div class="chart-wrap">
      <canvas id="chart-temas"></canvas>
    </div>
  </div>

  <!-- Questões mais erradas -->
  <div class="card">
    <h2>❌ Questões mais erradas</h2>
    <div id="lista-erros"></div>
  </div>

  <!-- Ações -->
  <div class="card" style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn-voltar" onclick="window.location.href='index.html'">← Voltar ao Quiz</button>
    <button class="btn-reset" id="btn-reset">🗑 Resetar progresso</button>
  </div>
</div>

<script>
const TEMAS = ['Nefrologia','Gastroenterologia','Endocrinologia','Hepatologia','Hematologia','Infectologia','Meio Interno'];
const CORES = {
  'Nefrologia':'#3b82f6','Gastroenterologia':'#f59e0b','Endocrinologia':'#8b5cf6',
  'Hepatologia':'#10b981','Hematologia':'#ef4444','Infectologia':'#06b6d4','Meio Interno':'#64748b'
};
const ICONS = {
  'Nefrologia':'🫘','Gastroenterologia':'🦷','Endocrinologia':'🔬',
  'Hepatologia':'🫀','Hematologia':'🩸','Infectologia':'🦠','Meio Interno':'⚗️'
};

function carregarDados() {
  return JSON.parse(localStorage.getItem('quiz_avc1_progresso') || '{}');
}

function renderDashboard() {
  const dados = carregarDados();
  const temas = Object.keys(dados);

  if (temas.length === 0) {
    document.getElementById('sem-dados').style.display = 'block';
    document.getElementById('dashboard-content').style.display = 'none';
    return;
  }
  document.getElementById('sem-dados').style.display = 'none';
  document.getElementById('dashboard-content').style.display = 'block';

  // ── Stats globais ──
  let totalAcertos = 0, totalTotal = 0;
  temas.forEach(t => { totalAcertos += dados[t].acertos; totalTotal += dados[t].total; });
  const pctGlobal = totalTotal > 0 ? Math.round((totalAcertos / totalTotal) * 100) : 0;

  document.getElementById('stats-globais').innerHTML = `
    <div class="stat"><div class="stat-n" style="color:#16a34a">${totalAcertos}</div><div class="stat-l">Acertos</div></div>
    <div class="stat"><div class="stat-n" style="color:#dc2626">${totalTotal - totalAcertos}</div><div class="stat-l">Erros</div></div>
    <div class="stat"><div class="stat-n">${totalTotal}</div><div class="stat-l">Respondidas</div></div>
    <div class="stat"><div class="stat-n" style="color:${pctGlobal >= 70 ? '#16a34a' : pctGlobal >= 50 ? '#f59e0b' : '#dc2626'}">${pctGlobal}%</div><div class="stat-l">Aproveitamento</div></div>
  `;

  // ── Gráfico ──
  const temasOrdenados = TEMAS.filter(t => dados[t]);
  const labels = temasOrdenados.map(t => ICONS[t] + ' ' + t);
  const pcts = temasOrdenados.map(t => {
    const d = dados[t];
    return d.total > 0 ? Math.round((d.acertos / d.total) * 100) : 0;
  });
  const bgColors = temasOrdenados.map(t => CORES[t] || '#64748b');

  new Chart(document.getElementById('chart-temas'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '% de acerto',
        data: pcts,
        backgroundColor: bgColors,
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const t = temasOrdenados[ctx.dataIndex];
              const d = dados[t];
              return ` ${d.acertos}/${d.total} (${ctx.raw}%)`;
            }
          }
        }
      },
      scales: {
        y: {
          min: 0, max: 100,
          ticks: { callback: v => v + '%' },
          grid: { color: '#f1f5f9' }
        },
        x: { grid: { display: false } }
      }
    }
  });

  // ── Questões mais erradas ──
  const erros = {};
  temas.forEach(tema => {
    const e = dados[tema].erros || {};
    Object.entries(e).forEach(([qid, n]) => { erros[qid] = { n, tema }; });
  });
  const topErros = Object.entries(erros).sort((a,b) => b[1].n - a[1].n).slice(0, 10);

  const lista = document.getElementById('lista-erros');
  if (topErros.length === 0) {
    lista.innerHTML = '<div class="empty">Nenhum erro registrado ainda — parabéns!</div>';
  } else {
    lista.innerHTML = topErros.map(([qid, info]) =>
      `<div class="erro-item">
        <div>
          <div style="font-weight:600">${qid}</div>
          <div class="erro-tema">${ICONS[info.tema] || ''} ${info.tema}</div>
        </div>
        <span class="erro-badge">${info.n}x errado</span>
       </div>`
    ).join('');
  }
}

document.getElementById('btn-reset').addEventListener('click', () => {
  if (confirm('Tem certeza que deseja resetar todo o progresso? Esta ação não pode ser desfeita.')) {
    localStorage.removeItem('quiz_avc1_progresso');
    location.reload();
  }
});

renderDashboard();
</script>
</body>
</html>
